format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "#7e9cd8"

[character]
success_symbol = "[>](bold #98bb6c)"
error_symbol = "[x](bold #e82424)"
vimcmd_symbol = "[<](bold #7e9cd8)"

[git_branch]
format = "[$branch]($style)"
style = "#727169"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#e6c384) ($ahead_behind$stashed)]($style)"
style = "#7e9cd8"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "#e6c384"
